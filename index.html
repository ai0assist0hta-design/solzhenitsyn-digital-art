<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Security headers (meta-tag form, since GitHub Pages can't set HTTP headers) -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob:;
        connect-src 'self' https://cdn.jsdelivr.net;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
    ">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()">

    <title>Solzhenitsyn Digital Art</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Trimmed font weights (was 5 → now 3) — smaller font payload -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&family=Noto+Sans:wght@900&display=swap"
        rel="stylesheet">
    <!-- Pre-warm Three.js CDN so dynamic imports are fast when user enters Theme 1 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <!-- Prefetch heavy 3D model in background while user browses main grid -->
    <link rel="prefetch" href="models/Pole.glb" as="fetch" crossorigin="anonymous">
</head>

<body>
    <main id="grid-system" class="grid-system">
        <!-- Content injected by script.js -->
    </main>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="script.js?v=6"></script>
</body>

</html>
